<section class="section contact" id="contact">
      <div class="container">
        <div class="section-title">
          <h2>Get In Touch</h2>
          <p>Have a project in mind? Let's work together!</p>
        </div>

        <div class="contact-container">
          <div class="contact-info">
            <div class="info-item">
              <i class="fas fa-phone"></i>
              <div>
                <h3>Phone</h3>
                <p>01150227005</p>
              </div>
            </div>
            <div class="info-item">
              <i class="fas fa-envelope"></i>
              <div>
                <h3>Email</h3>
                <p>sedikkhaled60&#64;gmail.com</p>
              </div>
            </div>
            <div class="info-item">
              <i class="fas fa-map-marker-alt"></i>
              <div>
                <h3>Location</h3>
                <p>Egypt</p>
              </div>
            </div>

            <div class="social-links">
              <a href="https://www.linkedin.com/in/sedik-khaled-ramadan-495935249/" target="_blank">
                <i class="fab fa-linkedin"></i>
              </a>
              <a href="https://github.com/sedik-khaled" target="_blank">
                <i class="fab fa-github"></i>
              </a>
              <a href="https://wa.me/201150227005" target="_blank">
                <i class="fab fa-whatsapp"></i>
              </a>
            </div>

            <a href="https://wa.me/201150227005" class="whatsapp-btn" target="_blank">
              <i class="fab fa-whatsapp"></i> Chat on WhatsApp
            </a>
          </div>

          <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">
            <div class="form-group">
              <label for="name">Your Name</label>
              <input 
                type="text" 
                id="name" 
                formControlName="name"
                [class.error]="contactForm.get('name')?.invalid && contactForm.get('name')?.touched">
              <div class="error-message" *ngIf="contactForm.get('name')?.invalid && contactForm.get('name')?.touched">
                Name is required
              </div>
            </div>

            <div class="form-group">
              <label for="email">Your Email</label>
              <input 
                type="email" 
                id="email" 
                formControlName="email"
                [class.error]="contactForm.get('email')?.invalid && contactForm.get('email')?.touched">
              <div class="error-message" *ngIf="contactForm.get('email')?.invalid && contactForm.get('email')?.touched">
                Valid email is required
              </div>
            </div>

            <div class="form-group">
              <label for="subject">Subject</label>
              <input 
                type="text" 
                id="subject" 
                formControlName="subject"
                [class.error]="contactForm.get('subject')?.invalid && contactForm.get('subject')?.touched">
              <div class="error-message" *ngIf="contactForm.get('subject')?.invalid && contactForm.get('subject')?.touched">
                Subject is required
              </div>
            </div>

            <div class="form-group">
              <label for="message">Your Message</label>
              <textarea 
                id="message" 
                formControlName="message"
                [class.error]="contactForm.get('message')?.invalid && contactForm.get('message')?.touched"
                rows="5"></textarea>
              <div class="error-message" *ngIf="contactForm.get('message')?.invalid && contactForm.get('message')?.touched">
                Message is required
              </div>
            </div>

            <button type="submit" class="submit-btn" [disabled]="contactForm.invalid || isSubmitting">
              <span *ngIf="!isSubmitting">Send Message</span>
              <span *ngIf="isSubmitting">
                <i class="fas fa-spinner fa-spin"></i> Sending...
              </span>
              <i class="fas fa-paper-plane" *ngIf="!isSubmitting"></i>
            </button>

            <div class="form-message" [class.success]="messageType === 'success'" 
                 [class.error]="messageType === 'error'" *ngIf="message">
              {{ message }}
            </div>
          </form>
        </div>
      </div>
    </section>
