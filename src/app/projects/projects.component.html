<section class="section projects" id="projects">
      <div class="container">
        <div class="section-title">
          <h2>My Projects</h2>
          <p>Here are some of my recent works</p>
        </div>

        <div class="project-filters">
          <button 
            *ngFor="let filter of filters" 
            class="filter-btn" 
            [class.active]="selectedFilter === filter.value"
            (click)="filterProjects(filter.value)">
            {{ filter.label }}
          </button>
        </div>

        <div class="projects-grid">
          <div class="project-card" *ngFor="let project of filteredProjects; let i = index"
               [style.animation-delay]="i * 0.1 + 's'">
            <div class="project-image">
              <img [src]="project.image" [alt]="project.title" loading="lazy">
              <div class="project-overlay">
                <div class="project-links">
                  <a [href]="project.liveLink" target="_blank" class="live-link">
                    <i class="fas fa-external-link-alt"></i>
                  </a>
                  <a [href]="project.githubLink" target="_blank" class="github-link">
                    <i class="fab fa-github"></i>
                  </a>
                </div>
              </div>
              <div class="project-featured" *ngIf="project.featured">
                <i class="fas fa-star"></i>
                Featured
              </div>
            </div>
            
            <div class="project-info">
              <h3>{{ project.title }}</h3>
              <p>{{ project.description }}</p>
              
              <div class="project-tech">
                <span class="tech-tag" *ngFor="let tech of project.technologies">
                  {{ tech }}
                </span>
              </div>

              <div class="project-actions">
                <a [href]="project.liveLink" target="_blank" class="action-btn demo">
                  <i class="fas fa-eye"></i>
                  Live Demo
                </a>
                <a [href]="project.githubLink" target="_blank" class="action-btn code">
                  <i class="fab fa-github"></i>
                  Source Code
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
